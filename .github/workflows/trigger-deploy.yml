name: Trigger Vercel Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        run: |
          curl -f -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
